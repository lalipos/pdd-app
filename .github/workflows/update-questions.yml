name: Sync PDD Questions

on:
  workflow_dispatch:      # Manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 Pillow

      - name: Run scraper
        id: scrape
        run: |
          python scraper/scrape_pdd.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Re-host new images on GitHub
        if: steps.scrape.outputs.exit_code == '0'
        run: python scraper/download_images.py

      - name: Commit and push if changed
        if: steps.scrape.outputs.exit_code == '0'
        run: |
          git config user.name "pdd-sync[bot]"
          git config user.email "pdd-sync@users.noreply.github.com"
          git add data/
          git commit -m "chore: sync questions $(date -u +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.scrape.outputs.exit_code == '1'
        run: echo "No question changes detected, skipping commit."
