name: Sync PDD Questions

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:      # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        id: sync
        run: |
          python scraper/sync.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.sync.outputs.exit_code == '0'
        run: |
          git config user.name "pdd-sync[bot]"
          git config user.email "pdd-sync@users.noreply.github.com"
          git add data/
          git commit -m "chore: sync questions from etspring $(date -u +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.sync.outputs.exit_code == '1'
        run: echo "No question changes detected, skipping commit."
